version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sigint
      POSTGRES_PASSWORD: sigint_password
      POSTGRES_DB: sigint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://sigint:sigint_password@db:5432/sigint
    depends_on:
      - db
    volumes:
      - ../apps/api:/app

volumes:
  postgres_data:
